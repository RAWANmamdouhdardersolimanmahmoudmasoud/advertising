<svg xmlns="http://www.w3.org/2000/svg"
     width="64"
     height="64"
     viewBox="0 0 64 64"
     fill="none">

    <defs>

        <linearGradient id="circleGradient"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%">

            <stop offset="0%" stop-color="rgba(255,255,255,.25)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,.10)"/>

        </linearGradient>

        <filter id="shadow"
                x="-20%"
                y="-20%"
                width="140%"
                height="140%">

            <feDropShadow
                dx="0"
                dy="2"
                stdDeviation="3"
                flood-color="#14284B"
                flood-opacity=".15"/>

        </filter>

    </defs>

    <!-- Circle -->

    <circle
        cx="32"
        cy="32"
        r="24"
        fill="white"
        fill-opacity=".14"
        filter="url(#shadow)"/>

    <!-- Arrow -->

    <path
        d="M27 22 L38 32 L27 42"
        stroke="white"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>