<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     fill="none">

    <defs>

        <linearGradient id="gold"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%">

            <stop offset="0%" stop-color="#F7D774"/>

            <stop offset="50%" stop-color="#D4A017"/>

            <stop offset="100%" stop-color="#B8860B"/>

        </linearGradient>

        <filter id="glow"
                x="-40%"
                y="-40%"
                width="180%"
                height="180%">

            <feGaussianBlur
                stdDeviation="2"
                result="blur"/>

            <feMerge>

                <feMergeNode in="blur"/>

                <feMergeNode in="SourceGraphic"/>

            </feMerge>

        </filter>

    </defs>

    <!-- Main Star -->

    <path

        filter="url(#glow)"

        fill="url(#gold)"

        d="
        M32 6
        L38 22
        L56 22
        L41 33
        L47 51
        L32 40
        L17 51
        L23 33
        L8 22
        L26 22
        Z"/>

</svg>