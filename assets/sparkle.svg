<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     fill="none">

  <defs>

    <linearGradient id="sparkleGradient"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">

      <stop offset="0%" stop-color="#F7D774"/>
      <stop offset="50%" stop-color="#FFD95A"/>
      <stop offset="100%" stop-color="#D4A017"/>

    </linearGradient>

    <filter id="glow"
            x="-50%"
            y="-50%"
            width="200%"
            height="200%">

      <feGaussianBlur stdDeviation="2.5"
                      result="blur"/>

      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>

    </filter>

  </defs>

  <!-- Main Sparkle -->

  <path
        d="M32 4
           L37 24
           L60 32
           L37 40
           L32 60
           L27 40
           L4 32
           L27 24
           Z"

        fill="url(#sparkleGradient)"
        filter="url(#glow)"/>

  <!-- Small Dot -->

  <circle
          cx="50"
          cy="12"
          r="3"
          fill="#F7D774"/>

  <!-- Small Sparkle -->

  <path
        d="M12 48
           L14 54
           L20 56
           L14 58
           L12 64
           L10 58
           L4 56
           L10 54
           Z"

        fill="#F7D774"/>

</svg>